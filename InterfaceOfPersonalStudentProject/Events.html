<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
  body { background: #f8f9fa; }
  .room-card {
    border-radius: 15px !important;
    border: 1px solid #dee2e6;
    background: #ffffff;
  }
  .room-card:hover {
    border-color: #0d6efd;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  .room-card.expired {
    opacity: 0.5;
    background: #f8f9fa !important;
  }
  .unread-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    background: #dc3545;
    color: #fff;
    border-radius: 50%;
    min-width: 20px;
    height: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light" style="background:#e9ecef; padding-top:4px; padding-bottom:4px;">
  <div class="container">
    <a class="navbar-brand" href="Events.html"><img src="assets/images/logo.png" alt="Connect" height="62" style="mix-blend-mode:multiply;"> <span style="font-size:1.55rem; font-weight:800; color:#1a4a6e; letter-spacing:0.3px;">Connect</span></a>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item" id="adminLink" style="display:none;"><a class="nav-link text-danger fw-bold" href="Admin.html"><i class="bi bi-shield-lock"></i> Admin</a></li>
        <li class="nav-item"><a class="nav-link" href="#" id="inboxBtn"><i class="bi bi-envelope-fill"></i> Inbox</a></li>
        <li class="nav-item"><a class="nav-link" id="navProfile" href="#">Profile</a></li>
        <li class="nav-item"><a class="nav-link" href="Register.html">Register</a></li>
        <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-5">

  <h1 class="mb-4 fw-bold">Available Rooms</h1>
  <div class="d-flex gap-3 align-items-center mb-4">
    <input type="text" id="roomSearch" class="form-control form-control-lg" placeholder="Search rooms..." style="max-width:340px;">
    <button
      class="btn btn-success btn-lg shadow-sm fw-bold ms-auto"
      onclick="goToCreateRoom()">
      <i class="bi bi-plus-lg me-2"></i> Create Room
    </button>
  </div>

  <div id="roomContainer" class="list-group"></div>

  <div id="pagination" class="d-flex justify-content-center align-items-center gap-3 mt-4" style="display:none!important;">
    <button id="prevBtn" class="btn btn-outline-primary" onclick="changePage(-1)" disabled>&larr; Previous</button>
    <span id="pageInfo" class="fw-bold text-muted"></span>
    <button id="nextBtn" class="btn btn-outline-primary" onclick="changePage(1)">Next &rarr;</button>
  </div>

</div>

<div class="offcanvas offcanvas-end" tabindex="-1" id="dmOffcanvas" aria-labelledby="dmOffcanvasLabel" style="width:420px;">
  <div class="offcanvas-header bg-light border-bottom">
    <div class="d-flex align-items-center gap-2">
      <button type="button" class="btn btn-sm btn-outline-secondary" id="dmBackBtn" onclick="showInboxView()" style="display:none;">
        <i class="bi bi-arrow-left"></i>
      </button>
      <div style="background:#6f42c1;color:#fff;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:1.1rem;">
        <i class="bi bi-envelope-fill"></i>
      </div>
      <div>
        <h6 class="mb-0" id="dmOffcanvasLabel">Inbox</h6>
        <small class="text-muted" id="dmRecipientEmail"></small>
      </div>
    </div>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column p-0">
    <div id="dmListView" style="overflow-y:auto;flex-grow:1;">
      <div id="dmConversationList"><p class="text-center text-muted mt-5">Loading...</p></div>
    </div>
    <div id="dmThreadView" style="display:none;flex-grow:1;flex-direction:column;min-height:0;">
      <div id="dmChatBox" class="flex-grow-1 p-3" style="overflow-y:auto;display:flex;flex-direction:column;gap:10px;">
        <p class="text-center text-muted mt-5">Loading...</p>
      </div>
      <div class="p-3 border-top bg-light">
        <div class="input-group">
          <input type="text" id="dmMsgInput" class="form-control" placeholder="Type a message...">
          <button class="btn btn-primary px-4" onclick="sendDirectMessageNow()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script>
if (!localStorage.getItem('token')) {
  window.location.href = 'Login.html';
}

function getTokenPayload() {
  const token = localStorage.getItem('token');
  if (!token) return null;
  try {
    return JSON.parse(atob(token.split('.')[1]));
  } catch(e) {
    return null;
  }
}

const payload = getTokenPayload();
let currentUserId = 0;
if (payload) {
  const userId = payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier'];
  if (userId) {
    currentUserId = parseInt(userId);
    document.getElementById('navProfile').href = 'userprofile.html?userId=' + userId;
  }
  const role = payload['http://schemas.microsoft.com/ws/2008/06/identity/claims/role'];
  if (role === 'Admin') {
    document.getElementById('adminLink').style.display = 'block';
  }
}

document.getElementById('logoutBtn').onclick = function() {
  localStorage.removeItem('token');
  window.location.href = 'Login.html';
};

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = String(text ?? '');
  return div.innerHTML;
}

let allRooms = [];
let currentPage = 1;
let totalPages = 1;
const PAGE_SIZE = 6;

async function loadRooms(page = 1) {
  const container = document.getElementById('roomContainer');
  try {
    const data = await ApiService.getAllRooms(page, PAGE_SIZE);
    allRooms = data.rooms || data;
    currentPage = data.currentPage || page;
    totalPages = data.totalPages || 1;
    renderRooms(allRooms);
    fetchUnreadBadges();
    updatePagination();
  } catch (err) {
    container.innerHTML = `<div class="alert alert-danger p-4 fs-5 text-center">Connection Error: Check API status!</div>`;
  }
}

function updatePagination() {
  const pagination = document.getElementById('pagination');
  const pageInfo = document.getElementById('pageInfo');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  if (totalPages <= 1) {
    pagination.style.display = 'none';
    return;
  }
  pagination.style.display = 'flex';
  pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;
}

function changePage(dir) {
  const newPage = currentPage + dir;
  if (newPage < 1 || newPage > totalPages) return;
  loadRooms(newPage);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderRooms(data) {
  const container = document.getElementById('roomContainer');
  container.innerHTML = "";
  if (data.length === 0) {
    container.innerHTML = "<p class='text-muted'>No rooms found.</p>";
    return;
  }
  const now = Date.now();
  data.forEach(item => {
    const name     = item.roomName || item.RoomName || "Unnamed";
    const desc     = item.description || item.Description || "No description provided.";
    const type     = item.roomType || item.RoomType || "Standard";
    const cap      = item.capacity || item.Capacity || "0";
    const loc      = item.location || item.Location || "Virtual";
    const isLocked = item.isPasswordProtected || item.IsPasswordProtected;
    const id       = item.id || item.Id;
    const expiry   = item.expiryDate || item.ExpiryDate;
    const isExpired = expiry && new Date(expiry).getTime() < now;

    const div = document.createElement('div');
    div.className = "list-group-item room-card d-flex justify-content-between align-items-center p-4 mb-3 shadow-sm" + (isExpired ? " expired" : "");
    div.dataset.roomId = id;
    div.dataset.roomName = name.toLowerCase();

    div.innerHTML = `
      <div class="flex-grow-1">
        <div class="d-flex align-items-center mb-2 flex-wrap gap-2">
          <h3 class="mb-0 fw-bold me-2 text-dark">${escapeHtml(name)}</h3>
          <span class="badge bg-secondary px-3 py-2">${escapeHtml(type)}</span>
          ${isExpired ? '<span class="badge bg-danger px-3 py-2">Past</span>' : ''}
          <span class="ms-1">
            ${isLocked
              ? '<i class="bi bi-lock-fill text-danger fs-3" title="Password Protected"></i>'
              : '<i class="bi bi-unlock text-success fs-3" title="Open Room"></i>'}
          </span>
        </div>
        <p class="text-muted mb-3 fs-5">${escapeHtml(desc)}</p>
        <div class="d-flex gap-3 flex-wrap">
          <div class="d-inline-block px-3 py-1 bg-primary bg-opacity-10 text-primary border border-primary rounded-pill fw-bold">
            <i class="bi bi-people-fill me-1"></i> Capacity: ${cap}
          </div>
          <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success border border-success rounded-pill fw-bold">
            <i class="bi bi-geo-alt-fill me-1"></i> ${escapeHtml(loc)}
          </div>
          ${expiry ? `<div class="d-inline-block px-3 py-1 bg-warning bg-opacity-10 text-warning border border-warning rounded-pill fw-bold">
            <i class="bi bi-calendar-event me-1"></i> ${new Date(expiry).toLocaleString([], {dateStyle:'medium', timeStyle:'short'})}
          </div>` : ''}
        </div>
      </div>
      <div class="d-flex flex-column gap-2 ms-3 align-items-end">
        <div class="position-relative">
          <button class="btn btn-primary btn-lg px-5 fw-bold shadow-sm" id="checkBtn_${id}" ${isExpired ? 'disabled' : ''}>Check</button>
          <span class="unread-badge" id="badge_${id}" style="display:none;"></span>
        </div>
      </div>
    `;
    if (!isExpired) {
      div.querySelector('#checkBtn_' + id).addEventListener('click', () => checkRoom(id, isLocked, name));
    }
    container.appendChild(div);
  });
}

async function fetchUnreadBadges() {
  for (const item of allRooms) {
    const id = item.id || item.Id;
    const expiry = item.expiryDate || item.ExpiryDate;
    if (expiry && new Date(expiry).getTime() < Date.now()) continue;
    try {
      const lastSeen = parseInt(localStorage.getItem('lastSeen_' + id) || '0');
      const messages = await ApiService.getMessagesByRoomId(id);
      const unread = (messages || []).filter(m => {
        const t = new Date(m.dateSent || m.DateSent || 0).getTime();
        return t > lastSeen;
      }).length;
      const badge = document.getElementById('badge_' + id);
      if (badge && unread > 0) {
        badge.textContent = unread > 99 ? '99+' : unread;
        badge.style.display = 'flex';
      }
    } catch(_) {}
  }
}

document.getElementById('roomSearch').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { renderRooms(allRooms); fetchUnreadBadges(); updatePagination(); return; }
  const filtered = allRooms.filter(r => {
    const name = (r.roomName || r.RoomName || '').toLowerCase();
    const desc = (r.description || r.Description || '').toLowerCase();
    const loc  = (r.location || r.Location || '').toLowerCase();
    return name.includes(q) || desc.includes(q) || loc.includes(q);
  });
  renderRooms(filtered);
  fetchUnreadBadges();
  document.getElementById('pagination').style.display = 'none';
});

async function checkRoom(id, isLocked, name) {
  let password = "";

  if (isLocked) {
    const entered = prompt("This room is password protected. Enter the password:");
    if (entered === null) return;
    password = entered;
  }

  try {
    await ApiService.enterRoom(id, password);
    localStorage.setItem('lastSeen_' + id, Date.now());
    window.location.href = `SubEvents.html?roomId=${id}&roomName=${encodeURIComponent(name)}`;
  } catch (err) {
    alert("Wrong password!");
  }
}
function goToCreateRoom() {
  window.location.href = "AddRoom.html";
}


loadRooms();

  function formatDate(dateString) {
    const date = new Date(dateString);
    const today = new Date();
    const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return date.toDateString() === today.toDateString()
      ? time
      : date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + time;
  }

  function displayName(email) {
    if (!email) return 'Unknown';
    return email.includes('@') ? email.split('@')[0] : email;
  }

  function getUserIdFromToken() {
    const token = localStorage.getItem('token');
    if (!token) return null;
    try {
      const p = JSON.parse(atob(token.split('.')[1]));
      return p['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier'] || null;
    } catch(e) { return null; }
  }

  let activeDmPartnerId = null;
  let activeDmPartnerEmail = null;
  let dmInterval = null;
  let dmOffcanvasInstance = null;

  function getDmOffcanvas() {
    if (!dmOffcanvasInstance) dmOffcanvasInstance = new bootstrap.Offcanvas(document.getElementById('dmOffcanvas'));
    return dmOffcanvasInstance;
  }

  function showInboxView() {
    if (dmInterval) { clearInterval(dmInterval); dmInterval = null; }
    activeDmPartnerId = null;
    activeDmPartnerEmail = null;
    document.getElementById("dmListView").style.display = "block";
    document.getElementById("dmThreadView").style.display = "none";
    document.getElementById("dmBackBtn").style.display = "none";
    document.getElementById("dmOffcanvasLabel").textContent = "Inbox";
    document.getElementById("dmRecipientEmail").textContent = "";
    loadInbox();
  }

  function showThreadView() {
    document.getElementById("dmListView").style.display = "none";
    document.getElementById("dmThreadView").style.display = "flex";
    document.getElementById("dmBackBtn").style.display = "inline-block";
  }

  async function loadInbox() {
    const currentId = parseInt(getUserIdFromToken());
    const listEl = document.getElementById("dmConversationList");
    try {
      const all = await ApiService.getDirectMessagesByUserId(currentId);
      if (!all || !all.length) {
        listEl.innerHTML = "<p class='text-center text-muted mt-5'>No messages yet.</p>";
        return;
      }
      const threads = new Map();
      for (const m of all) {
        const partnerId = m.senderId === currentId ? m.receiverId : m.senderId;
        const partnerEmail = m.senderId === currentId ? '' : m.senderEmail;
        const existing = threads.get(partnerId);
        if (!existing || new Date(m.dateSent) > new Date(existing.dateSent)) {
          threads.set(partnerId, {
            partnerId,
            partnerEmail: partnerEmail || (existing && existing.partnerEmail) || ('User #' + partnerId),
            content: m.content,
            dateSent: m.dateSent,
            isMine: m.senderId === currentId
          });
        } else if (!existing.partnerEmail && partnerEmail) {
          existing.partnerEmail = partnerEmail;
        }
      }
      const sorted = Array.from(threads.values()).sort((a, b) => new Date(b.dateSent) - new Date(a.dateSent));
      listEl.innerHTML = sorted.map(t => {
        const name = displayName(t.partnerEmail);
        const initial = name.charAt(0).toUpperCase();
        const preview = (t.isMine ? 'You: ' : '') + t.content;
        return `
          <div style="display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid #eee;cursor:pointer;"
               data-partner-id="${t.partnerId}"
               data-partner-email="${escapeHtml(t.partnerEmail)}"
               onclick="openDirectMessage(this.dataset.partnerId, this.dataset.partnerEmail)">
            <div style="width:40px;height:40px;border-radius:50%;background:#6f42c1;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;">${escapeHtml(initial)}</div>
            <div style="flex-grow:1;min-width:0;">
              <div style="display:flex;justify-content:space-between;font-size:0.85rem;">
                <span style="font-weight:600;">${escapeHtml(name)}</span>
                <span style="color:#6c757d;font-size:0.75rem;">${formatDate(t.dateSent)}</span>
              </div>
              <div style="color:#6c757d;font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(preview)}</div>
            </div>
          </div>`;
      }).join('');
    } catch(e) {
      listEl.innerHTML = "<p class='text-center text-danger mt-5'>Failed to load inbox.</p>";
    }
  }

  async function openDirectMessage(senderIdRaw, senderEmail) {
    const targetId = parseInt(senderIdRaw);
    const currentId = parseInt(getUserIdFromToken());
    if (!targetId || isNaN(targetId)) return;
    if (currentId === targetId) return;

    activeDmPartnerId = targetId;
    activeDmPartnerEmail = senderEmail;
    document.getElementById("dmOffcanvasLabel").textContent = "Chat with " + displayName(senderEmail);
    document.getElementById("dmRecipientEmail").textContent = senderEmail;
    document.getElementById("dmChatBox").innerHTML = "<p class='text-center text-muted mt-5'>Loading...</p>";

    getDmOffcanvas().show();
    showThreadView();
    await loadDirectMessages();
    if (dmInterval) clearInterval(dmInterval);
    dmInterval = setInterval(loadDirectMessages, 10000);
  }

  async function loadDirectMessages() {
    if (!activeDmPartnerId) return;
    const currentId = parseInt(getUserIdFromToken());
    const chatBox = document.getElementById("dmChatBox");
    try {
      const all = await ApiService.getDirectMessagesByUserId(currentId);
      const thread = (all || []).filter(m =>
        (m.senderId === currentId && m.receiverId === activeDmPartnerId) ||
        (m.senderId === activeDmPartnerId && m.receiverId === currentId)
      );
      if (!thread.length) {
        chatBox.innerHTML = "<p class='text-center text-muted mt-5'>No messages yet. Say hi!</p>";
        return;
      }
      chatBox.innerHTML = thread.map(m => {
        const isMine = m.senderId === currentId;
        const bubbleStyle = isMine
          ? 'background:#0d6efd;color:#fff;align-self:flex-end;'
          : 'background:#f1f3f5;color:#212529;align-self:flex-start;';
        return `
          <div style="max-width:80%;padding:8px 12px;border-radius:14px;${bubbleStyle}">
            <div style="font-size:0.7rem;opacity:0.8;display:flex;justify-content:space-between;gap:8px;margin-bottom:2px;">
              <span>${isMine ? 'You' : escapeHtml(displayName(m.senderEmail))}</span>
              <span>${formatDate(m.dateSent)}</span>
            </div>
            <div>${escapeHtml(m.content)}</div>
          </div>`;
      }).join('');
      chatBox.scrollTop = chatBox.scrollHeight;
    } catch(e) {
      chatBox.innerHTML = "<p class='text-center text-muted'>Failed to load messages.</p>";
    }
  }

  async function sendDirectMessageNow() {
    const input = document.getElementById("dmMsgInput");
    const content = input.value.trim();
    if (!content || !activeDmPartnerId) return;
    try {
      await ApiService.sendDirectMessage({ receiverId: activeDmPartnerId, content });
      input.value = "";
      await loadDirectMessages();
    } catch(err) {
      alert("Failed to send direct message.");
    }
  }

  document.getElementById("dmMsgInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendDirectMessageNow();
  });

  document.getElementById('dmOffcanvas').addEventListener('hidden.bs.offcanvas', () => {
    if (dmInterval) clearInterval(dmInterval);
    dmInterval = null;
    activeDmPartnerId = null;
    activeDmPartnerEmail = null;
    document.getElementById("dmListView").style.display = "block";
    document.getElementById("dmThreadView").style.display = "none";
    document.getElementById("dmBackBtn").style.display = "none";
    document.getElementById("dmOffcanvasLabel").textContent = "Inbox";
    document.getElementById("dmRecipientEmail").textContent = "";
  });

  document.getElementById('inboxBtn').addEventListener('click', function(e) {
    e.preventDefault();
    getDmOffcanvas().show();
    showInboxView();
  });
</script>
</body>
</html>
