<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create SubRoom</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color:#f8f9fa; padding-top:50px; }
.card { border-radius:15px; border:none; }
</style>
</head>

<body>

<div class="container">
  <div class="pt-4 mb-2">
    <button class="btn btn-outline-secondary" id="backBtn">&larr; Back to Room</button>
  </div>
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg">
        <div class="card-header bg-primary text-white p-3">
          <h4 class="mb-0">Create SubRoom</h4>
        </div>

        <div class="card-body p-4">

          <form id="subRoomForm">
            <input type="hidden" id="roomId">

            <div class="mb-3">
              <label class="form-label fw-bold">SubRoom Name</label>
              <input type="text" id="subRoomName" class="form-control" placeholder="Enter sub room name" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
              CREATE SUB ROOM
            </button>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="assets/js/api.js"></script>

<script>
if (!localStorage.getItem('token')) {
    window.location.href = 'Login.html';
}

const params = new URLSearchParams(window.location.search);
const roomId = params.get("roomId");

if (!roomId) {
    alert("Room ID missing in URL");
    window.location.href = 'Events.html';
} else {
    document.getElementById("roomId").value = roomId;
    document.getElementById("backBtn").onclick = function() {
        window.location.href = 'SubEvents.html?roomId=' + roomId;
    };
}

const form = document.getElementById("subRoomForm");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const payload = {
        roomId: parseInt(document.getElementById("roomId").value),
        subRoomName: document.getElementById("subRoomName").value
    };

    try {
        await ApiService.addSubRoom(payload);
        alert("SubRoom created successfully!");
        window.location.href = 'SubEvents.html?roomId=' + roomId;
    } catch (err) {
        alert("Error: " + err.message);
    }
});
</script>

</body>
</html>
