<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .profile-card { max-width: 500px; margin: 60px auto; }
        .profile-icon {
            width: 80px; height: 80px;
            background: #0d6efd;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white;
            margin: 0 auto 20px auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="card shadow">
            <div class="card-body p-5 text-center">
                <div class="profile-icon">👤</div>
                <h3 id="profileName" class="mb-1">Loading...</h3>
                <p id="profileEmail" class="text-muted mb-3"></p>
                <div id="profileDetails"></div>
                <a href="javascript:history.back()" class="btn btn-outline-secondary mt-4">&larr; Go Back</a>
            </div>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("userId");

    function getTokenPayload() {
        const token = localStorage.getItem('token');
        if (!token) return null;
        try {
            return JSON.parse(atob(token.split('.')[1]));
        } catch(e) {
            return null;
        }
    }

    const payload = getTokenPayload();

    if (!payload) {
        window.location.href = 'Login.html';
    }

    const myId = payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier'];
    const myEmail = payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress'];
    const myRole = payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/role'];

    if (String(myId) === String(userId)) {
        document.getElementById('profileName').innerText = myEmail || "My Profile";
        document.getElementById('profileEmail').innerText = myEmail;
        document.getElementById('profileDetails').innerHTML = `
            <span class="badge bg-primary px-3 py-2">${myRole || 'User'}</span>
        `;
    } else {
        document.getElementById('profileName').innerText = "User #" + userId;
        document.getElementById('profileEmail').innerText = "";
        document.getElementById('profileDetails').innerHTML = `
            <p class="text-muted">Detailed profile not available yet.</p>
        `;
    }
</script>

</body>
</html>
