<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Student Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #f4f7f6; }
        .register-card { max-width: 650px; margin: 50px auto; border: none; }
        #map { height: 280px; border-radius: 10px; border: 1px solid #dee2e6; }
        #mapSearchResults { position: absolute; z-index: 1000; background: white; width: 100%; border: 1px solid #dee2e6; border-top: none; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; display: none; }
        #mapSearchResults .search-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        #mapSearchResults .search-item:hover { background: #e9ecef; }
    </style>
</head>
<body>

<div class="container">
    <div class="card register-card shadow">
        <div class="card-body p-5">
            <h3 class="text-center mb-4">Create Your Profile</h3>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="Name" class="form-control" placeholder="John Doe" required maxlength="150">
                </div>

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" name="Email" class="form-control" placeholder="john@example.com" required maxlength="200">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" name="Age" class="form-control" min="1" max="120">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="Password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                </div>

                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <div class="position-relative mb-2">
                        <input type="text" id="mapSearch" class="form-control" placeholder="Search for a place..." autocomplete="off">
                        <div id="mapSearchResults"></div>
                    </div>
                    <div id="map"></div>
                    <input type="hidden" id="locationName" name="Location">
                    <small class="text-muted mt-1 d-block">Selected: <span id="selectedLocation">Click on the map or search for a place</span></small>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Register</button>
                </div>
                <div class="mt-4 text-center border-top pt-3">
                    <p class="mb-0 text-muted">Already have an account?</p>
                    <a href="login.html" class="fw-bold text-decoration-none">Click here to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="assets/js/api.js"></script>
<script>
    const map = L.map('map').setView([50.6326, 5.5797], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let marker = null;

    function placeMarker(lat, lng, name) {
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lng]).addTo(map).bindPopup(name).openPopup();
        map.setView([lat, lng], 15);
        document.getElementById('locationName').value = name;
        document.getElementById('selectedLocation').textContent = name;
    }

    map.on('click', async function(e) {
        const { lat, lng } = e.latlng;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
            const data = await res.json();
            placeMarker(lat, lng, data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`);
        } catch {
            placeMarker(lat, lng, `${lat.toFixed(5)}, ${lng.toFixed(5)}`);
        }
    });

    const searchInput = document.getElementById('mapSearch');
    const searchResults = document.getElementById('mapSearchResults');
    let searchTimeout = null;

    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        const query = searchInput.value.trim();
        if (query.length < 3) { searchResults.style.display = 'none'; return; }

        searchTimeout = setTimeout(async () => {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                const results = await res.json();
                searchResults.innerHTML = results.length === 0
                    ? '<div class="search-item text-muted">No results found</div>'
                    : results.map(r => `<div class="search-item" data-lat="${r.lat}" data-lon="${r.lon}" data-name="${r.display_name}">${r.display_name}</div>`).join('');
                searchResults.style.display = 'block';
            } catch {
                searchResults.style.display = 'none';
            }
        }, 400);
    });

    searchResults.addEventListener('click', (e) => {
        const item = e.target.closest('.search-item');
        if (!item || !item.dataset.lat) return;
        placeMarker(parseFloat(item.dataset.lat), parseFloat(item.dataset.lon), item.dataset.name);
        searchInput.value = item.dataset.name;
        searchResults.style.display = 'none';
    });

    document.addEventListener('click', (e) => {
        if (!searchResults.contains(e.target) && e.target !== searchInput) {
            searchResults.style.display = 'none';
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const userData = Object.fromEntries(formData.entries());
        if (userData.Age) userData.Age = parseInt(userData.Age);

        const btn = e.target.querySelector('button[type="submit"]');
        try {
            if (btn) { btn.disabled = true; btn.innerText = "Registering..."; }
            await ApiService.register(userData);
            alert("Registration successful!");
            window.location.href = 'login.html';
        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            if (btn) { btn.disabled = false; btn.innerText = "Register"; }
        }
    });
</script>
</body>
</html>
